<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#b8420a">
<title>바르샤바 가이드 투어 (v2 · 구글 임베드)</title>
<meta name="description" content="중앙역에서 게토 영웅 추모비까지 도보 6km · 13정거장 가이드. 각 구간 구글 지도 임베드.">
<link rel="stylesheet" href="../navi/assets/css/navi.css">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="../navi/assets/icons/icon-192.png">
<link rel="icon" type="image/png" href="../navi/assets/icons/icon-192.png">
</head>
<body>

<header class="tour-header">
  <div class="kicker">Lecture 06 · Walking Tour</div>
  <h1></h1>
  <p class="subtitle"></p>
  <div class="tour-meta">
    <div class="item total-km"><div class="val">—</div><div class="key">총 도보</div></div>
    <div class="item total-time"><div class="val">—</div><div class="key">소요</div></div>
    <div class="item stops-count"><div class="val">—</div><div class="key">정거장</div></div>
  </div>
</header>

<div id="ticket-card-slot"></div>

<div class="progress-bar">
  <span class="count">0 / 13</span>
  <div class="track"><div class="fill"></div></div>
  <span style="font-size: 11px; color: var(--ink-mute);">방문</span>
</div>

<main>
  <section id="stops-container" class="stops"></section>
</main>

<footer class="tour-footer">
  <p>폴란드 교양강의 6회차 · 바르샤바 도보 투어</p>
  <p><a href="index.html">← 버전 비교</a> · <a href="v1-leaflet.html">v1 (인터랙티브 지도) →</a></p>
</footer>

<nav class="bottom-nav" aria-label="정거장 네비게이션">
  <button class="prev">
    <span class="label">← 이전</span>
    <span class="target">—</span>
  </button>
  <div class="center">
    <div class="current">01</div>
    <div style="font-size: 10px; color: var(--ink-mute);">/ <span class="total">14</span></div>
  </div>
  <button class="next">
    <span class="label">다음 →</span>
    <span class="target">—</span>
  </button>
</nav>

<script src="stops-data.js"></script>
<script src="../navi/assets/js/navi-core.js"></script>
<script>
  (function () {
    const { NaviCore } = window;
    NaviCore.fillHeader();
    NaviCore.injectTicketCard(document.getElementById('ticket-card-slot'));
    NaviCore.render({
      container: document.getElementById('stops-container'),
      withEmbed: true,
    });
    NaviCore.setupBottomNav();
  })();
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch((e) => console.warn('SW failed:', e));
    });
  }
</script>
</body>
</html>
