<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#b8420a">
<title>바르샤바 가이드 투어 (v1 · 인터랙티브 지도)</title>
<meta name="description" content="중앙역에서 게토 영웅 추모비까지 도보 6km · 13정거장 가이드. 모바일 최적 인터랙티브 지도 + 구글지도 길찾기.">
<link rel="stylesheet" href="../navi/assets/css/navi.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="../navi/assets/icons/icon-192.png">
<link rel="icon" type="image/png" href="../navi/assets/icons/icon-192.png">
</head>
<body>

<header class="tour-header">
  <div class="kicker">Lecture 06 · Walking Tour</div>
  <h1></h1>
  <p class="subtitle"></p>
  <div class="tour-meta">
    <div class="item total-km"><div class="val">—</div><div class="key">총 도보</div></div>
    <div class="item total-time"><div class="val">—</div><div class="key">소요</div></div>
    <div class="item stops-count"><div class="val">—</div><div class="key">정거장</div></div>
  </div>
</header>

<div id="ticket-card-slot"></div>

<div class="progress-bar">
  <span class="count">0 / 13</span>
  <div class="track"><div class="fill"></div></div>
  <span style="font-size: 11px; color: var(--ink-mute);">방문</span>
</div>

<div id="overview-map" class="overview-map" aria-label="전체 루트 지도"></div>

<div style="padding: 10px 16px; display: flex; gap: 8px; align-items: center; font-size: 13px; background: var(--bg-card); border-bottom: 1px solid var(--line);">
  <button id="btn-locate" style="min-height: 36px; padding: 0 14px; border-radius: 8px; border: 1px solid var(--line); background: var(--bg); color: var(--ink); font-weight: 600; font-size: 13px; cursor: pointer;">📍 내 위치</button>
  <span id="nearest-stop" style="color: var(--ink-soft); flex: 1;"></span>
</div>

<main>
  <section id="stops-container" class="stops"></section>
</main>

<footer class="tour-footer">
  <p>폴란드 교양강의 6회차 · 바르샤바 도보 투어</p>
  <p><a href="index.html">← 버전 비교</a> · <a href="v2-embed.html">v2 (구글 임베드) →</a></p>
</footer>

<nav class="bottom-nav" aria-label="정거장 네비게이션">
  <button class="prev">
    <span class="label">← 이전</span>
    <span class="target">—</span>
  </button>
  <div class="center">
    <div class="current">01</div>
    <div style="font-size: 10px; color: var(--ink-mute);">/ <span class="total">14</span></div>
  </div>
  <button class="next">
    <span class="label">다음 →</span>
    <span class="target">—</span>
  </button>
</nav>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="stops-data.js"></script>
<script src="../navi/assets/js/navi-core.js"></script>
<script src="../navi/assets/js/v1-leaflet.js"></script>
<script>
  (function () {
    const { NaviCore } = window;
    NaviCore.fillHeader();
    NaviCore.injectTicketCard(document.getElementById('ticket-card-slot'));
    NaviCore.render({
      container: document.getElementById('stops-container'),
      withEmbed: false,
    });
    NaviCore.setupBottomNav();
    window.V1Leaflet.initMap();
  })();
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch((e) => console.warn('SW failed:', e));
    });
  }
</script>
</body>
</html>
